<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro — Simulador de Autômatos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@800&display=swap');
  :root { --bg:#0d0f14; --card:#1a1e29; --border:#252a38; --red:#f87171; --text:#e2e8f0; --muted:#64748b; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'JetBrains Mono',monospace; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--card); border:1px solid rgba(248,113,113,.3); border-radius:14px; padding:40px 48px; text-align:center; max-width:500px; width:90%; }
  .icon { font-size:48px; margin-bottom:16px; }
  h1 { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--red); margin-bottom:12px; }
  .msg { font-size:12px; color:var(--muted); background:rgba(248,113,113,.06); border:1px solid rgba(248,113,113,.2); border-radius:8px; padding:14px; line-height:1.7; text-align:left; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; cursor:pointer; border:none; text-decoration:none; margin-top:24px; background:var(--border); color:var(--text); transition:all .15s; }
  .btn:hover { background:#2e3447; }
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
  <h1>Erro ao processar</h1>
  <div class="msg">{{ mensagem }}</div>
  <a href="javascript:history.back()" class="btn">← Voltar e corrigir</a>
</div>
</body>
</html>
